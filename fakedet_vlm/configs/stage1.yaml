stage: 1
output_subdir: "stage1_align"

train:
  trainable: ["projector"]      # ViT and LLM frozen
  num_train_epochs: 1
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 16
  learning_rate: 1.0e-3
  weight_decay: 0.0
  warmup_ratio: 0.03
  lr_scheduler_type: "cosine"
  bf16: true
  fp16: false
  gradient_checkpointing: true
  logging_steps: 10
  eval_steps: 500
  save_steps: 500
  save_total_limit: 2
  optim: "adamw_torch"
  remove_unused_columns: false
  report_to: "none"
